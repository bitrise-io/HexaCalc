        - automatic_code_signing: api-key
        - distribution_method: app-store
        - export_method: "$BITRISE_EXPORT_METHOD"
        - compile_bitcode: 'no'
        - upload_bitcode: 'no'
    - deploy-to-bitrise-io:
        inputs:
        - debug_mode: 'true'
    - script@1:
        is_skippable: true
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            # upload the artifact via api to the "Rere - The calculator - Demo" connected app

            git clone https://github.com/bitrise-io/release-management-recipes.git
            cd release-management-recipes

            export ARTIFACT_PATH="$BITRISE_IPA_PATH"
            export AUTHORIZATION_TOKEN="$ARTIFACT_UPLOAD_SECRET"
            export CONNECTED_APP_ID=59501d5b-8c4f-47d0-ba2c-248bd17f5b7f

            /bin/bash ./api/upload_installable_artifact.sh

            export CONNECTED_APP_ID=2eeccc51-95cd-4189-aa4c-b7ec157a623f

            /bin/bash ./api/upload_installable_artifact.sh

            # or run a script from your repository, like:
            # bash ./path/to/script.sh
            # not just bash, e.g.:
            # ruby ./path/to/script.rb
