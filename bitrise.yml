            set -o pipefail
            # debug log
            set -x

            pwd

            echo '00000000–0000000000000001,00000000–0000000000000002,00000000–0000000000000003' > devices.txt

            DEVICE_LIST_PATH=$(realpath devices.txt)

            envman add --key DEVICE_LIST_PATH --value "${DEVICE_LIST_PATH}"
