  submit_for_app_store_review:
    steps:
    - script@1:
        title: Create version if needed
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            response=$(curl -s -w "%{http_code}" -X GET "https://api.bitrise.io//connected-apps/$RM_CONNECTED_APP_ID/apple-app-store/app-versions/draft" \
              -H "accept: application/json" \
              -H "authorization: $BITRISE_ACCESS_TOKEN" \
              -H "Content-Type: application/json")

            http_code="${response: -3}"        # last 3 characters
            body="${response::-3}"             # everything except last 3 characters

            if [[ "$http_code" == "404" ]]; then
              echo "Error: Resource not found (404)"
              exit 1
            elif [[ "$http_code" != "200" ]]; then
              echo "Error: HTTP $http_code"
              echo "Response body: $body"
              exit 1
            fi

            # Extract version_string safely now
            version_string=$(echo "$body" | jq -r '.version_string')

            echo "Version string: $version_string"
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            curl -X 'PATCH' -s \
              "https://api.bitrise.io/release-management/v1/releases/${RM_RELEASE_ID}/apple-app-store/release/settings" \
              -H 'accept: application/json' \
              -H "authorization: $BITRISE_ACCESS_TOKEN" \
