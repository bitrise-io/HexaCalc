---
format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: ios
pipelines:
  build-pipeline:
    stages:
    - pre_stage: {}
    - deploy-stage: {}
  test-pipeline:
    workflows:
      test_env: {}
      build-archive:
        depends_on:
        - test_env
      build-archive-developer:
        depends_on:
        - test_env
stages:
  pre_stage:
    workflows:
    - compile-code: {}
  deploy-stage:
    workflows:
    - build_archive_2: {}
workflows:
  build_archive_2:
    steps:
    - git-clone@8: {}
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            cd $BITRISE_SOURCE_DIR

            xcrun agvtool new-marketing-version $APP_STORE_VERSION

            DATETIME_VERSION_CODE=$(date '+%s')
            xcrun agvtool new-version -all $APP_STORE_VERSION.$DATETIME_VERSION_CODE
        title: Update build numbers
    - xcode-archive@5:
        inputs:
        - automatic_code_signing: api-key
        - export_method: "$BITRISE_EXPORT_METHOD"
        - distribution_method: app-store
    - deploy-to-bitrise-io@2:
        inputs:
        - notify_email_list: "$EXTERNAL_GROUP_1"
  build-archive:
    steps:
    - git-clone@8: {}
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
